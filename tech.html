<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tech task</title>
    <link rel="stylesheet" href="tech.css">
</head>
<body>

<div class="box">
    <center><h3>Rental Calculation</h3></center>

    <label>Material Type:</label>
    <select id="material" onchange="setRent()">
        <option value="">-- Select Material --</option>
        <option value="sheet">Sheet</option>
        <option value="pipe">Pipe</option>
        <option value="column">Column Box</option>
    </select><br><br>

    <label>Item Quantity:</label>
    <input type="number" id="quantity"><br><br>

    <label>Rent per item per day:</label>
    <input type="number" id="rent" readonly><br><br>

    <label>Number of days:</label>
    <input type="number" id="days"><br><br>

    <label>Damaged items:</label>
    <input type="number" id="items"><br><br>

    <label>Advance amount paid:</label>
    <input type="number" id="advanced"><br><br>

    <!-- ONE BUTTON -->
    <button onclick="calculate()">Calculate</button><br><br>

    <label>Total Rent:</label>
    <input type="text" id="totalrent" readonly><br><br>

    <label>Damage Cost:</label>
    <input type="text" id="damagecost" readonly><br><br>

    <label>Final Amount:</label>
    <input type="text" id="finalamount" readonly><br><br>

    <label>Balance:</label>
    <input type="text" id="balance" readonly><br><br>
</div>

<script src="tech.js"></script>
</body>
</html>
